# Build on every push to any branch (but not on tags — release.yml handles those)
#
# We also skip this workflow when the commit message starts with "release:"
# (the commit that release.sh creates just before pushing the tag). Without
# this guard, every release triggers two builds: one from this workflow on
# the branch push, and one from release.yml on the tag push.
name: Build

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'

env:
  PACK_DIR:     SkyBlock_Enhanced_Modern_Edition_1.21.11
  JAVA_VERSION: '21'

jobs:
  build:
    name: Build
    # Skip the commit that release.sh makes right before pushing the tag.
    # release.yml re-runs the full build from the tag anyway.
    if: ${{ !startsWith(github.event.head_commit.message, 'release:') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin

      - name: Download pakku
        run: |
          curl -sSL -o pakku.jar \
            https://github.com/juraj-hrivnak/Pakku/releases/latest/download/pakku.jar

      - name: Get modpack info
        id: info
        run: |
          chmod +x .github/scripts/get_modpack_info.sh
          .github/scripts/get_modpack_info.sh

      - name: Export modpack
        working-directory: ${{ env.PACK_DIR }}
        run: java -jar ../pakku.jar export

      - name: Upload Modrinth artifacts
        uses: actions/upload-artifact@v6
        with:
          name: "${{ steps.info.outputs.modpack_name }}-mr-${{ github.run_number }}"
          path: ${{ env.PACK_DIR }}/build/modrinth/*.mrpack

      - name: Upload CurseForge artifacts
        if: ${{ hashFiles(format('{0}/build/curseforge/*.zip', env.PACK_DIR)) != '' }}
        uses: actions/upload-artifact@v6
        with:
          name: "${{ steps.info.outputs.modpack_name }}-cf-${{ github.run_number }}"
          path: ${{ env.PACK_DIR }}/build/curseforge/*.zip
