name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  PAKKU_VERSION: '1.4.0'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Read pack metadata
        id: meta
        run: |
          echo "pack_version=$(jq -r '.version' SkyBlock_Enhanced/pakku.json)" >> "$GITHUB_OUTPUT"
          echo "mc_version=$(jq -r '.mc_versions[0]' SkyBlock_Enhanced/pakku-lock.json)" >> "$GITHUB_OUTPUT"

      - name: Guard - tag must match pakku.json version
        run: |
          if [ "${GITHUB_REF_NAME}" != "v${{ steps.meta.outputs.pack_version }}" ] && [ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match pakku.json version ${{ steps.meta.outputs.pack_version }}"
            exit 1
          fi

      - name: Extract latest changelog entry
        run: |
          awk '/^---[[:space:]]*$/{c++; if (c==2) exit} {print}' CHANGELOG.md > RELEASE_CHANGELOG.md
          if [ ! -s RELEASE_CHANGELOG.md ]; then
            echo "ERROR: extracted changelog is empty."
            exit 1
          fi
          echo "===== Changelog ====="
          cat RELEASE_CHANGELOG.md

      - name: Build modpack with Pakku
        run: |
          curl -fsSL -o pakku.jar \
            "https://github.com/juraj-hrivnak/Pakku/releases/download/v${PAKKU_VERSION}/pakku.jar"
          cd SkyBlock_Enhanced
          java -jar ../pakku.jar export
          ls -lR build/

      - name: Upload Pakku build output
        uses: actions/upload-artifact@v4
        with:
          name: pakku-build-output
          path: SkyBlock_Enhanced/build/
          if-no-files-found: warn
          retention-days: 7

      - name: Determine release type
        id: reltype
        run: |
          V="${{ steps.meta.outputs.pack_version }}"
          case "$V" in
            *-alpha*|*-Alpha*) echo "type=alpha" >> "$GITHUB_OUTPUT" ;;
            *-beta*|*-Beta*)   echo "type=beta"  >> "$GITHUB_OUTPUT" ;;
            *)                 echo "type=release" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Publish to CurseForge, Modrinth & GitHub
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id: 1365629
          curseforge-token: ${{ secrets.CF_TOKEN }}
          curseforge-files: SkyBlock_Enhanced/build/curseforge/*.zip

          modrinth-id: e0oMrxjp
          modrinth-token: ${{ secrets.MR_TOKEN }}
          modrinth-files: SkyBlock_Enhanced/build/modrinth/*.mrpack

          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-tag: v${{ steps.meta.outputs.pack_version }}
          github-files: |
            SkyBlock_Enhanced/build/curseforge/*.zip
            SkyBlock_Enhanced/build/modrinth/*.mrpack

          name: SkyBlock Enhanced ${{ steps.meta.outputs.pack_version }}
          version: ${{ steps.meta.outputs.pack_version }}
          version-type: ${{ steps.reltype.outputs.type }}
          changelog-file: RELEASE_CHANGELOG.md
          loaders: fabric
          environment: client
          game-versions: ${{ steps.meta.outputs.mc_version }}
          game-version-filter: none
