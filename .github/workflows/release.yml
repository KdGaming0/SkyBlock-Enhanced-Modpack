# Release workflow
#
# Pipeline:
#   validate ─▶ build (export #1) ─▶ test-client ─▶ publishers ─▶ finalize
#                                      │
#                                      ├─ Tier 1: mrpack validation
#                                      ├─ stage the prebuilt, CI-only
#                                      │  ca-modlist-ci-trigger mod jar into
#                                      │  run/mods/ (see
#                                      │  .github/testmods/ca-modlist-ci-trigger/README.md)
#                                      ├─ Tier 2: headless client launch. The
#                                      │  trigger mod fires
#                                      │  '/crash_assistant modlist save' on
#                                      │  world join, writing
#                                      │  config/crash_assistant/modlist.json.
#                                      │  (Crash Assistant's own auto_update
#                                      │  hook does NOT fire here — it only
#                                      │  triggers on the TitleScreen tick,
#                                      │  which mc-runtime-test skips entirely.)
#                                      ├─ harvest modlist.json into
#                                      │  .pakku/client-overrides/…, stripping
#                                      │  both the mc-runtime-test harness mod
#                                      │  entry AND the trigger mod's own entry
#                                      └─ export #2 → "release-build" artifact
#
# The artifact that gets PUBLISHED is "release-build" (export #2), which
# contains the freshly generated Crash Assistant modlist. Export #1 ("build")
# is only used for testing. If Tier 2 is skipped ([skip-client-test] or act),
# the tested artifact is passed through unchanged and the committed
# modlist.json ships instead.
name: Release

on:
  push:
    tags:
      - 'v*'           # stable:   v3.1.2
                       # beta:     v3.1.2-beta.1
                       # hotfix:   v3.1.2-hotfix1  (pakku.json stays at 3.1.2)

env:
  PACK_DIR:      SkyBlock_Enhanced_Modern_Edition_26.1
  JAVA_VERSION:  '25'
  # Pin to a tag (e.g. 'v1.3.0') for reproducible release builds.
  PAKKU_VERSION: latest

  # Local runs: `act` sets ACT=true automatically. We use that single flag
  # to gate artifact upload/download and Tier 2 client launch.

jobs:

  # ── VALIDATE ────────────────────────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-latest
    permissions:
      contents: write          # needed to delete mismatched tags when checks run
    outputs:
      modpack_version:   ${{ steps.info.outputs.modpack_version }}
      modpack_name:      ${{ steps.info.outputs.modpack_name }}
      minecraft_version: ${{ steps.info.outputs.minecraft_version }}
      modpack_loader:    ${{ steps.info.outputs.modpack_loader }}
      release_type:      ${{ steps.info.outputs.release_type }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract modpack info
        id: info
        run: |
          chmod +x .github/scripts/get_modpack_info.sh
          .github/scripts/get_modpack_info.sh

      - name: Check for skip-validation flag
        id: skip_check
        run: |
          MSG=$(git log -1 --pretty=%B)
          if echo "$MSG" | grep -q "\[skip-validation\]"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "  [INFO]  [skip-validation] found in commit message — strict checks disabled"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate tag matches pakku.json version
        if: steps.skip_check.outputs.skip != 'true'
        run: |
          TAG_VER="${GITHUB_REF#refs/tags/v}"
          PKG_VER="${{ steps.info.outputs.modpack_version }}"

          # Strip optional -hotfixN suffix: the tag may be v3.1.2-hotfix1 while
          # pakku.json stays at 3.1.2 (hotfix republishes the same modpack
          # version with a patched artifact).
          TAG_BASE="${TAG_VER%-hotfix*}"

          if [[ "$TAG_BASE" != "$PKG_VER" ]]; then
            echo "::error::Tag v${TAG_VER} does not match pakku.json version ${PKG_VER}"
            git push origin ":refs/tags/v${TAG_VER}" || true
            exit 1
          fi
          if [[ "$TAG_VER" != "$PKG_VER" ]]; then
            echo "✅ Hotfix tag: v${TAG_VER} (pakku.json: ${PKG_VER})"
          else
            echo "✅ Tag matches pakku.json: ${PKG_VER}"
          fi

      - name: Validate version was bumped since previous tag
        if: steps.skip_check.outputs.skip != 'true'
        run: |
          CUR_VER="${{ steps.info.outputs.modpack_version }}"
          PREV_VER="${{ steps.info.outputs.previous_modpack_version }}"
          TAG_NAME="${GITHUB_REF#refs/tags/}"

          if [[ "$PREV_VER" == "none" ]]; then
            echo "✅ No previous tag — this is the first release."
            exit 0
          fi

          # Strict semver comparison. Hotfix tags (e.g. v3.1.2-hotfix1) are
          # allowed to reuse the same pakku.json version as the previous tag
          # because they patch the release artifact without bumping the modpack
          # version the user sees in-game.
          IS_HOTFIX=false
          if [[ "$TAG_NAME" =~ ^v${CUR_VER}-hotfix[0-9]+$ ]]; then
            IS_HOTFIX=true
          fi

          # Parse stable base (strip -beta.N / -hotfixN) for numeric comparison.
          strip_suffix() { echo "$1" | sed -E 's/-(beta\.[0-9]+|hotfix[0-9]+)$//'; }
          CUR_BASE=$(strip_suffix "$CUR_VER")
          PREV_BASE=$(strip_suffix "$PREV_VER")

          # sort -V puts the lower version first; if CUR < PREV we fail.
          LOWEST=$(printf '%s\n%s\n' "$CUR_BASE" "$PREV_BASE" | sort -V | head -n1)

          if [[ "$CUR_BASE" == "$PREV_BASE" ]]; then
            # Same base version — only allowed for beta iteration or hotfix tag.
            if [[ "$IS_HOTFIX" == "true" ]]; then
              echo "✅ Hotfix release: ${TAG_NAME} reuses pakku.json version ${CUR_VER}"
              exit 0
            fi
            if [[ "$CUR_VER" != "$PREV_VER" ]]; then
              # e.g. 3.1.2-beta.2 after 3.1.2-beta.1 — string differs, base same
              echo "✅ Beta iteration: ${PREV_VER} → ${CUR_VER}"
              exit 0
            fi
            echo "::error::Version in pakku.json NOT bumped!"
            echo "::error::Current ${CUR_VER} matches previous tag ${{ steps.info.outputs.previous_tag }}."
            echo "::error::Use a -hotfix tag if you intend to reuse the version, e.g. v${CUR_VER}-hotfix1"
            echo "::error::Deleting tag '$TAG_NAME' and failing build..."
            git push origin ":refs/tags/$TAG_NAME" || true
            exit 1
          elif [[ "$LOWEST" == "$CUR_BASE" ]]; then
            echo "::error::Version regression: ${CUR_VER} is LOWER than previous ${PREV_VER}!"
            echo "::error::Deleting tag '$TAG_NAME' and failing build..."
            git push origin ":refs/tags/$TAG_NAME" || true
            exit 1
          fi

          echo "✅ Version bumped: ${PREV_VER} → ${CUR_VER}"

      # Single source of truth: release.sh already assembled release-body.md
      # (changelog + optional config-changelog) into packcore/markdown/.
      # We just upload it — no re-assembly in CI.
      - name: Upload release-body artifact
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v6
        with:
          name: release-body
          path: ${{ env.PACK_DIR }}/.pakku/overrides/packcore/markdown/release-body-v${{ steps.info.outputs.modpack_version }}.md
          if-no-files-found: warn

  # ── BUILD (export #1 — the artifact that gets tested) ──────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v6

      - name: Export modpack
        uses: ./.github/actions/export-modpack
        with:
          pack-dir:      ${{ env.PACK_DIR }}
          java-version:  ${{ env.JAVA_VERSION }}
          pakku-version: ${{ env.PAKKU_VERSION }}
          use-cache:     ${{ env.ACT && 'false' || 'true' }}

      - name: Upload build artifacts
        if: ${{ !env.ACT }}
        uses: actions/upload-artifact@v6
        with:
          name: build
          path: |
            ${{ env.PACK_DIR }}/build/
            !${{ env.PACK_DIR }}/build/.*

  # ── TEST-CLIENT + MODLIST + FINAL EXPORT ───────────────────────────────────
  test-client:
    name: Test Client Launch & Finalize Build
    runs-on: ubuntu-latest
    needs: [validate, build]
    timeout-minutes: 30
    permissions:
      contents: write        # commit refreshed modlist.json back to the branch
    steps:
      # Full checkout: the second `pakku export` needs the whole pack dir,
      # not just .github/scripts.
      - uses: actions/checkout@v6

      - name: Download build artifacts
        if: ${{ !env.ACT }}
        uses: actions/download-artifact@v6
        with:
          name: build
          path: build

      - name: Use local build artifacts (act)
        if: ${{ env.ACT }}
        run: |
          TARGET="${{ env.PACK_DIR }}/build/modrinth/SkyBlock Enhanced-${{ needs.validate.outputs.modpack_version }}.mrpack"
          if [[ -f "$TARGET" ]]; then
            mkdir -p build/modrinth
            cp -v "$TARGET" build/modrinth/
          else
            echo "::warning::Expected mrpack not found at $TARGET"
            echo "Searching for any .mrpack in the repo:"
            find . -name '*.mrpack' || true
          fi

      - name: Tier 1 – Validate mrpack
        run: |
          chmod +x .github/scripts/setup_mc_client.sh
          .github/scripts/setup_mc_client.sh

      - name: Check for Tier 2 skip conditions
        id: skip_check
        run: |
          if [[ -n "${ACT:-}" ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "  [INFO]  Running under act — skipping Tier 2 (client launch)"
            exit 0
          fi
          MSG=$(git log -1 --pretty=%B 2>/dev/null || echo "")
          if echo "$MSG" | grep -q "\[skip-client-test\]"; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "  [INFO]  [skip-client-test] in commit message — skipping Tier 2"
            echo "::warning::Tier 2 skipped — Crash Assistant modlist.json will NOT be regenerated; the committed copy ships instead."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract mods and overrides from mrpack
        if: ${{ steps.skip_check.outputs.skip != 'true' }}
        run: |
          chmod +x .github/scripts/extract_mrpack.py
          python3 .github/scripts/extract_mrpack.py

      # mc-runtime-test joins straight into a singleplayer world and never
      # renders a TitleScreen, so Crash Assistant's own modlist auto_update
      # hook (which only fires on the TitleScreen tick) never runs here.
      # This tiny CI-only mod fires the manual "/crash_assistant modlist
      # save" command itself, shortly after world join. See
      # .github/testmods/ca-modlist-ci-trigger/README.md.
      - name: Stage prebuilt modlist CI trigger mod into run/mods
        if: ${{ steps.skip_check.outputs.skip != 'true' }}
        run: |
          mkdir -p run/mods
          SRC=".github/testmods/ca-modlist-ci-trigger/prebuilt/ModlistCiTrigger.jar"
          # Renamed on the way in (not just copied as ModlistCiTrigger.jar) so
          # crash_assistant_modlist.sh's HARNESS_REGEX also matches on the
          # jarName key, not only on the modId buried inside the entry value.
          DEST_NAME="ca-modlist-ci-trigger-1.0.0.jar"

          if [[ ! -f "$SRC" ]]; then
            echo "::error::Prebuilt trigger mod jar not found at $SRC — commit it or restore the 'Build modlist CI trigger mod' step."
            exit 1
          fi

          cp "$SRC" "run/mods/$DEST_NAME"
          echo "  [OK]  Staged $DEST_NAME into run/mods/ (from $SRC)"

      - name: Tier 2 – Headless client launch
        if: ${{ steps.skip_check.outputs.skip != 'true' }}
        uses: headlesshq/mc-runtime-test@4.4.0
        with:
          mc:               ${{ needs.validate.outputs.minecraft_version }}
          modloader:        fabric
          regex:            '.*fabric.*'
          mc-runtime-test:  fabric
          java:             ${{ env.JAVA_VERSION }}
          dummy-assets:     true
          xvfb:             true
          cache-mc:         github

      # Pull the modlist Crash Assistant just wrote, drop the test-harness
      # mod entry, and stage it into .pakku/client-overrides/… so the final
      # export ships it.
      - name: Harvest generated modlist.json
        id: modlist
        if: ${{ steps.skip_check.outputs.skip != 'true' }}
        run: .github/scripts/crash_assistant_modlist.sh harvest

      - name: Upload modlist.json artifact
        if: ${{ !env.ACT && steps.skip_check.outputs.skip != 'true' }}
        uses: actions/upload-artifact@v6
        with:
          name: crash-assistant-modlist
          path: ${{ env.PACK_DIR }}/.pakku/client-overrides/config/crash_assistant/modlist.json

      # Keep the repo in sync so local `pakku export` (and the next release's
      # baseline) uses the fresh modlist. The tag itself keeps pointing at the
      # original commit — this only advances the branch. Best-effort: if the
      # branch moved on since the tag was pushed, this is skipped gracefully.
      - name: Commit refreshed modlist.json back to ${{ github.event.repository.default_branch }}
        if: ${{ !env.ACT && steps.skip_check.outputs.skip != 'true' && steps.modlist.outputs.changed == 'true' }}
        continue-on-error: true
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${{ env.PACK_DIR }}/.pakku/client-overrides/config/crash_assistant/modlist.json"
          git commit -m "chore: refresh crash assistant modlist for ${GITHUB_REF#refs/tags/} [skip ci]"
          git push origin "HEAD:${{ github.event.repository.default_branch }}" \
            || echo "::warning::Branch moved since tag push — commit modlist.json manually (it is attached as the 'crash-assistant-modlist' artifact)."

      # Export #2: rebuild the mrpack/CF zip WITH the fresh modlist.json.
      # This is the artifact that gets published.
      - name: Final export (with refreshed modlist)
        if: ${{ steps.skip_check.outputs.skip != 'true' }}
        uses: ./.github/actions/export-modpack
        with:
          pack-dir:      ${{ env.PACK_DIR }}
          java-version:  ${{ env.JAVA_VERSION }}
          pakku-version: ${{ env.PAKKU_VERSION }}
          use-cache:     ${{ env.ACT && 'false' || 'true' }}

      - name: Upload release-build artifact (final export)
        if: ${{ !env.ACT && steps.skip_check.outputs.skip != 'true' }}
        uses: actions/upload-artifact@v6
        with:
          name: release-build
          path: |
            ${{ env.PACK_DIR }}/build/
            !${{ env.PACK_DIR }}/build/.*

      # Tier 2 skipped → pass the tested artifact through unchanged so the
      # publishers always find a "release-build" artifact.
      - name: Upload release-build artifact (pass-through, Tier 2 skipped)
        if: ${{ !env.ACT && steps.skip_check.outputs.skip == 'true' }}
        uses: actions/upload-artifact@v6
        with:
          name: release-build
          path: build/

      - name: Upload game logs on failure
        if: ${{ !env.ACT && failure() }}
        uses: actions/upload-artifact@v6
        with:
          name: game-logs-${{ github.run_number }}
          path: |
            run/logs/
            run/crash-reports/
            run/config/crash_assistant/
          if-no-files-found: ignore
          retention-days: 7

  # ── PUBLISH (split into parallel, independent jobs) ─────────────────────────
  # Rationale: previously one flaky publisher (e.g. Modrinth) would block the
  # next (CurseForge) and leave the release in a split-brain state. Each
  # destination is its own job; they run in parallel and one failing doesn't
  # prevent the others from succeeding. The GitHub Release is flipped to DRAFT
  # when any downstream publisher fails, so a human can review before it goes
  # live — no automatic tag deletion.

  github-release:
    name: Publish · GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, test-client]
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.release.outputs.id }}
    steps:
      - name: Download release-body artifact
        if: ${{ !env.ACT }}
        uses: actions/download-artifact@v6
        with:
          name: release-body
          path: .

      - name: Download release build
        if: ${{ !env.ACT }}
        uses: actions/download-artifact@v6
        with:
          name: release-build
          path: build

      - name: Resolve release body
        id: body
        run: |
          VER="${{ needs.validate.outputs.modpack_version }}"
          # release.sh writes the fully-assembled body. Fall back to a stub
          # only if something went wrong upstream.
          SRC="release-body-v${VER}.md"
          if [[ -f "$SRC" ]]; then
            cp "$SRC" release-body.md
            echo "✅ Using release-body from artifact"
          else
            printf '## 🛠 Update %s\n\nMod and dependency updates.\n' "$VER" > release-body.md
            echo "::warning::release-body artifact missing — using stub body"
          fi

      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-body.md
          files: build/modrinth/*.mrpack
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ needs.validate.outputs.release_type == 'beta' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-modrinth:
    name: Publish · Modrinth
    runs-on: ubuntu-latest
    needs: [validate, test-client]
    if: ${{ vars.MR_PROJECT_ID != '' }}
    steps:
      - name: Download release-body artifact
        uses: actions/download-artifact@v6
        with:
          name: release-body
          path: .

      - name: Download release build
        uses: actions/download-artifact@v6
        with:
          name: release-build
          path: build

      - name: Stage changelog file
        run: |
          VER="${{ needs.validate.outputs.modpack_version }}"
          SRC="release-body-v${VER}.md"
          [[ -f "$SRC" ]] && cp "$SRC" release-body.md || echo "Update ${VER}" > release-body.md

      - name: Publish to Modrinth
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id:    ${{ vars.MR_PROJECT_ID }}
          modrinth-token: ${{ secrets.MR_TOKEN }}
          modrinth-files: build/modrinth/*.mrpack
          name:           "${{ needs.validate.outputs.modpack_name }} ${{ needs.validate.outputs.modpack_version }}"
          version:        ${{ needs.validate.outputs.modpack_version }}
          version-type:   ${{ needs.validate.outputs.release_type }}
          game-versions:  ${{ needs.validate.outputs.minecraft_version }}
          loaders:        ${{ needs.validate.outputs.modpack_loader }}
          changelog-file: release-body.md

  publish-curseforge:
    name: Publish · CurseForge
    runs-on: ubuntu-latest
    needs: [validate, test-client]
    if: ${{ vars.CF_PROJECT_ID != '' }}
    steps:
      - name: Download release-body artifact
        uses: actions/download-artifact@v6
        with:
          name: release-body
          path: .

      - name: Download release build
        uses: actions/download-artifact@v6
        with:
          name: release-build
          path: build

      - name: Stage changelog file
        run: |
          VER="${{ needs.validate.outputs.modpack_version }}"
          SRC="release-body-v${VER}.md"
          [[ -f "$SRC" ]] && cp "$SRC" release-body.md || echo "Update ${VER}" > release-body.md

      - name: Publish to CurseForge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          curseforge-id:    ${{ vars.CF_PROJECT_ID }}
          curseforge-token: ${{ secrets.CF_TOKEN }}
          curseforge-files: build/curseforge/*.zip
          name:           "${{ needs.validate.outputs.modpack_name }} ${{ needs.validate.outputs.modpack_version }}"
          version:        ${{ needs.validate.outputs.modpack_version }}
          version-type:   ${{ needs.validate.outputs.release_type }}
          game-versions:  ${{ needs.validate.outputs.minecraft_version }}
          loaders:        ${{ needs.validate.outputs.modpack_loader }}
          changelog-file: release-body.md

  # ── FINALIZE ────────────────────────────────────────────────────────────────
  # Runs after every publisher job regardless of outcome. If any publisher
  # failed we mark the GitHub Release as a draft so a human can review before
  # it goes live — no automatic tag deletion. The Fluxer notification only
  # fires when everything succeeded.
  finalize:
    name: Finalize
    runs-on: ubuntu-latest
    needs: [validate, github-release, publish-modrinth, publish-curseforge]
    if: always()
    permissions:
      contents: write
    steps:
      - name: Determine outcome
        id: outcome
        run: |
          MR="${{ needs.publish-modrinth.result }}"
          CF="${{ needs.publish-curseforge.result }}"
          GH="${{ needs.github-release.result }}"
          echo "  Modrinth:   $MR"
          echo "  CurseForge: $CF"
          echo "  GitHub:     $GH"

          # Treat 'skipped' as success (e.g. CF not configured).
          all_ok=true
          for r in "$MR" "$CF" "$GH"; do
            case "$r" in
              success|skipped) ;;
              *) all_ok=false ;;
            esac
          done
          echo "all_ok=$all_ok" >> "$GITHUB_OUTPUT"

      - name: Mark GitHub Release as draft on partial failure
        if: steps.outcome.outputs.all_ok != 'true' && needs.github-release.result == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "::warning::One or more publishers failed — marking GitHub Release ${TAG} as draft."
          echo "::warning::The tag is preserved. Review Modrinth/CurseForge, then publish the draft manually."
          curl -sSf -X PATCH \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases/${{ needs.github-release.outputs.release_id }}" \
            -d '{"draft": true}' \
            || echo "::warning::Could not flip release to draft — do it manually in the UI."

      - name: Send Fluxer release notification
        if: steps.outcome.outputs.all_ok == 'true' && vars.FLUXER_WEBHOOK_URL != ''
        continue-on-error: true
        run: |
          if [[ "${{ needs.validate.outputs.release_type }}" == "beta" ]]; then
            CONTENT="## **${{ needs.validate.outputs.modpack_name }}** ${{ needs.validate.outputs.modpack_version }} beta is available for testing! 🧪\n[Modrinth](<https://modrinth.com/modpack/${{ vars.MR_PROJECT_ID }}/version/${{ needs.validate.outputs.modpack_version }}>) • [GitHub](<https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}>) • [Issues](<https://github.com/${{ github.repository }}/issues>)\n> ⚠️ This is a **beta** release and may not be fully stable."
          else
            CONTENT="## **${{ needs.validate.outputs.modpack_name }}** has been updated to ${{ needs.validate.outputs.modpack_version }}! 🎉\n[Modrinth](<https://modrinth.com/modpack/${{ vars.MR_PROJECT_ID }}/version/${{ needs.validate.outputs.modpack_version }}>) • [GitHub](<https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}>) • [Issues](<https://github.com/${{ github.repository }}/issues>)"
          fi
          curl -sSf -X POST "${{ vars.FLUXER_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "{\"username\": \"SkyBlock Enhanced\", \"content\": \"$CONTENT\"}"

      - name: Fail workflow if any publisher failed
        if: steps.outcome.outputs.all_ok != 'true'
        run: |
          echo "::error::One or more publish jobs failed. GitHub Release (if created) was marked as draft."
          echo "::error::The tag is preserved so you can re-run individual publisher jobs."
          exit 1
