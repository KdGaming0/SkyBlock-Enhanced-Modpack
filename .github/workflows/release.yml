name: Release
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  PAKKU_VERSION: '1.4.0'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '25'

      - name: Read pack metadata
        id: meta
        run: |
          echo "pack_version=$(jq -r '.version' SkyBlock_Enhanced/pakku.json)" >> "$GITHUB_OUTPUT"
          echo "mc_version=$(jq -r '.mc_versions[0]' SkyBlock_Enhanced/pakku-lock.json)" >> "$GITHUB_OUTPUT"

      - name: Guard - tag must match pakku.json version
        run: |
          if [ "${GITHUB_REF_NAME}" != "v${{ steps.meta.outputs.pack_version }}" ] && [ "${GITHUB_EVENT_NAME}" != "workflow_dispatch" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match pakku.json version ${{ steps.meta.outputs.pack_version }}"
            exit 1
          fi

      - name: Extract latest changelog entry
        run: |
          awk '/^---[[:space:]]*$/{exit} {print}' CHANGELOG.md > RELEASE_CHANGELOG.md
          if [ ! -s RELEASE_CHANGELOG.md ]; then
            echo "ERROR: extracted changelog is empty."
            exit 1
          fi
          echo "===== Changelog ====="
          cat RELEASE_CHANGELOG.md

      - name: Build modpack with Pakku
        run: |
          curl -fsSL -o pakku.jar \
            "https://github.com/juraj-hrivnak/Pakku/releases/download/v${PAKKU_VERSION}/pakku.jar"
          cd SkyBlock_Enhanced
          java -jar ../pakku.jar export
          ls -lR build/

      - name: Upload Pakku build output
        uses: actions/upload-artifact@v4
        with:
          name: pakku-build-output
          path: SkyBlock_Enhanced/build/
          if-no-files-found: warn
          retention-days: 7

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Publish to CurseForge, Modrinth & GitHub
        env:
          CURSEFORGE_API_KEY: ${{ secrets.CF_TOKEN }}
          MODRINTH_TOKEN: ${{ secrets.MR_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CF_FILE="$(ls SkyBlock_Enhanced/build/curseforge/*.zip | head -1)"
          MR_FILE="$(ls SkyBlock_Enhanced/build/modrinth/*.mrpack | head -1)"

          echo "Resolved CF_FILE: $CF_FILE"
          echo "Resolved MR_FILE: $MR_FILE"

          if [ -z "$CF_FILE" ] || [ -z "$MR_FILE" ]; then
            echo "::error::Missing build artifact(s). CF_FILE='$CF_FILE' MR_FILE='$MR_FILE'"
            echo "Contents of build directory:"
            find SkyBlock_Enhanced/build -type f
            exit 1
          fi

          ./gradlew publishMods --no-daemon \
            -PpackVersion="${{ steps.meta.outputs.pack_version }}" \
            -PmcVersion="${{ steps.meta.outputs.mc_version }}" \
            -PcfFile="$CF_FILE" \
            -PmrFile="$MR_FILE" \
            -PchangelogFile="RELEASE_CHANGELOG.md"
