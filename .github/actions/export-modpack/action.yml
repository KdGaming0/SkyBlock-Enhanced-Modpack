# .github/actions/build-modlist-ci-trigger/action.yml
# ─────────────────────────────────────────────────────────────────────────────
# Composite action: build the CI-only "modlist save trigger" Fabric mod
# (source: .github/testmods/ca-modlist-ci-trigger/) and expose the built
# jar's path as an output, ready to be copied into run/mods/.
#
# This mod is NEVER part of the shipped modpack — see
# .github/testmods/ca-modlist-ci-trigger/README.md for why it exists
# (mc-runtime-test skips the TitleScreen, so Crash Assistant's normal
# modlist auto-save never fires during the Tier 2 headless client test).
#
# Uses gradle/actions/setup-gradle instead of a committed Gradle wrapper —
# no wrapper jar to keep in sync, and it comes with build-result caching
# out of the box.
#
# NOT invoked by release.yml anymore. Tier 2 now stages a prebuilt jar
# committed at .github/testmods/ca-modlist-ci-trigger/prebuilt/ModlistCiTrigger.jar
# instead of rebuilding on every release (saves the Java/Gradle setup on
# every run). This action is kept around for regenerating that prebuilt jar
# by hand after changing the trigger mod's source — e.g. via a manual
# workflow_dispatch job, or `gradle build` locally in
# .github/testmods/ca-modlist-ci-trigger/, then commit the resulting jar
# (renamed to ModlistCiTrigger.jar) back to the prebuilt/ path above.
# ─────────────────────────────────────────────────────────────────────────────
name: Build modlist CI trigger mod
description: Build the CI-only Fabric mod that fires "/crash_assistant modlist save" on world join.

inputs:
  minecraft-version:
    description: Minecraft version to build the trigger mod against (should match the pack's target, e.g. from get_modpack_info.sh)
    required: true
  java-version:
    description: Temurin Java version to build with
    required: false
    default: '25'
  gradle-version:
    description: Gradle version to build with
    required: false
    default: '8.10'

outputs:
  jar-path:
    description: Absolute path to the built trigger mod jar
    value: ${{ steps.locate.outputs.jar-path }}

runs:
  using: composite
  steps:
    - name: Set up Java ${{ inputs.java-version }}
      uses: actions/setup-java@v5
      with:
        java-version: ${{ inputs.java-version }}
        distribution: temurin

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4
      with:
        gradle-version: ${{ inputs.gradle-version }}
        cache-read-only: false

    - name: Build trigger mod
      shell: bash
      working-directory: .github/testmods/ca-modlist-ci-trigger
      run: |
        gradle build \
          -Pminecraft_version="${{ inputs.minecraft-version }}" \
          --console=plain --no-daemon

    - name: Locate built jar
      id: locate
      shell: bash
      working-directory: .github/testmods/ca-modlist-ci-trigger
      run: |
        JAR=$(find build/libs -maxdepth 1 -name '*.jar' ! -name '*-sources.jar' | head -n1)
        if [[ -z "$JAR" ]]; then
          echo "::error::Trigger mod build produced no jar under build/libs/ — check the 'Build trigger mod' step output above."
          exit 1
        fi
        echo "  [OK]  Built $JAR"
        echo "jar-path=$(pwd)/$JAR" >> "$GITHUB_OUTPUT"
